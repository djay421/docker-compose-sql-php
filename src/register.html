<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — Vault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">

  <div class="split-layout split-layout--register">

    <!-- Left panel: brand -->
    <div class="brand-panel">
      <div class="brand-panel__inner">
        <div class="brand-logo">VAULT</div>
        <div class="brand-tagline">
          <span>New here.</span>
          <span>Welcome.</span>
          <span>Let's begin.</span>
        </div>
        <div class="brand-issue">ISSUE №002 — CREATION</div>
      </div>
      <div class="brand-grid-lines" aria-hidden="true">
        <div class="gl gl--1"></div>
        <div class="gl gl--2"></div>
        <div class="gl gl--3"></div>
      </div>
      <div class="brand-watermark" aria-hidden="true">JOIN<br>US</div>
    </div>

    <!-- Right panel: form -->
    <div class="form-panel">
      <div class="form-panel__inner">

        <div class="form-eyebrow">
          <span class="dot dot--amber"></span> NEW ACCOUNT
        </div>

        <h1 class="form-heading">Create<br><em>Account.</em></h1>

        <form action="register_process.php" method="POST" class="auth-form" novalidate>

          <div class="field-group">
            <label for="username" class="field-label">Username</label>
            <input id="username" type="text" name="username" placeholder="whats your name?" autocomplete="username" required>
          </div>

          <div class="field-group">
            <label for="password" class="field-label">Password</label>
            <input id="password" type="password" name="password" placeholder="make it strong" autocomplete="new-password" required>
          </div>

          <button type="submit" class="btn-primary btn-primary--amber">
            <span>Create Account</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>

        </form>

        <p class="switch-link">Already a member? <a href="login.html">Sign in →</a></p>

        <div class="form-rule"></div>
        <div class="form-footer">Your password is stored hashed · We never share your data.</div>
      </div>
    </div>

  </div>

</body>
</html>
